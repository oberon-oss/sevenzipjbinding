#file: noinspection CIAidGitLabYamlIncludeUnavailable
name: Build, Test, and Deploy JARs

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "main"
      - "master"
    tags:
      - "Release-*"

permissions:
  contents: write

jobs:
  build_test:
    name: Build and test ${{ matrix.artifact-suffix }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            artifact-suffix: "Linux-x86_64"
            platform: "linux"

          - os: "macos-13"
            artifact-suffix: "macOS-x86_64"
            platform: "macos"
            java-arch: "x86_64"
            osx-arch: "x86_64"

          - os: "macos-14"
            artifact-suffix: "macOS-arm64"
            platform: "macos"
            java-arch: "arm64"
            osx-arch: "arm64"

          - os: "windows-latest"
            artifact-suffix: "Windows-x86_64"
            platform: "windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Show Java tools
        shell: bash
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          which java
          which javac
          java -version
          javac -version
          find "$JAVA_HOME/include" -maxdepth 2 -type f | sort
          if command -v javah >/dev/null 2>&1; then
            echo "javah found at: $(command -v javah)"
          else
            echo "javah not found, expected for modern JDKs"
          fi

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make gcc g++

      - name: Set up MSYS2 / MinGW64
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: "MINGW64"
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            

      # CMake Configuration starts.

      - name: Configure CMake - Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          test -f "$JAVA_HOME/include/jni.h"
          test -f "$JAVA_HOME/include/linux/jni_md.h"

          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_STANDARD=14 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_EXTENSIONS=ON \
            -DJAVA_INCLUDE_PATH="$JAVA_HOME/include" \
            -DJAVA_INCLUDE_PATH2="$JAVA_HOME/include/linux" \
            -DJAVA_COMPILE="$JAVA_HOME/bin/javac" \
            -DJAVA_RUNTIME="$JAVA_HOME/bin/java" \
            -DJAVA_DOC="$JAVA_HOME/bin/javadoc" \
            -DJAVA_ARCHIVE="$JAVA_HOME/bin/jar" \
            -DJAVA_USE_JAVAH=FALSE \
            -DJAVA_HEADER_COMPILE="javac-h-disabled"

      - name: Configure CMake - macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          test -f "$JAVA_HOME/include/jni.h"
          test -f "$JAVA_HOME/include/darwin/jni_md.h"

          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_STANDARD=14 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_EXTENSIONS=ON \
            -DJAVA_INCLUDE_PATH="$JAVA_HOME/include" \
            -DJAVA_INCLUDE_PATH2="$JAVA_HOME/include/darwin" \
            -DJAVA_COMPILE="$JAVA_HOME/bin/javac" \
            -DJAVA_RUNTIME="$JAVA_HOME/bin/java" \
            -DJAVA_DOC="$JAVA_HOME/bin/javadoc" \
            -DJAVA_ARCHIVE="$JAVA_HOME/bin/jar" \
            -DJAVA_USE_JAVAH=FALSE \
            -DJAVA_HEADER_COMPILE="javac-h-disabled" \
            -DJAVA_ARCH=${{ matrix.java-arch }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx-arch }}

      - name: Configure CMake - Windows
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          JDK_HOME="$(cygpath -u "$JAVA_HOME")"

          echo "JAVA_HOME=$JAVA_HOME"
          echo "JDK_HOME=$JDK_HOME"
          test -f "$JDK_HOME/include/jni.h"
          test -f "$JDK_HOME/include/win32/jni_md.h"

          cmake -S . -B build \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_STANDARD=14 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_EXTENSIONS=ON \
            -DJAVA_INCLUDE_PATH="$JDK_HOME/include" \
            -DJAVA_INCLUDE_PATH2="$JDK_HOME/include/win32" \
            -DJAVA_COMPILE="$JDK_HOME/bin/javac.exe" \
            -DJAVA_RUNTIME="$JDK_HOME/bin/java.exe" \
            -DJAVA_DOC="$JDK_HOME/bin/javadoc.exe" \
            -DJAVA_ARCHIVE="$JDK_HOME/bin/jar.exe" \
            -DJAVA_USE_JAVAH=FALSE \
            -DJAVA_HEADER_COMPILE="javac-h-disabled" \
            -DMINGW64=Yes

      # CMake Configuration ends.


      - name: Build - Linux/macOS
        if: matrix.platform != 'windows'
        run: |
          cmake --build build --config Release --parallel

      - name: Build - Windows
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cmake --build build --config Release --parallel 1

      - name: Run tests - Linux/macOS
        if: matrix.platform != 'windows'
        run: |
          ctest --test-dir build --output-on-failure

      - name: Run tests - Windows
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          ctest --test-dir build --output-on-failure

      - name: Collect non-test JARs - Linux/macOS
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          mkdir -p dist
          find build -type f -name "*.jar" \
            ! -iname "*test*.jar" \
            ! -iname "*tests*.jar" \
            -exec cp {} dist/ \;

      - name: Collect non-test JARs - Windows
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p dist
          find build -type f -name "*.jar" \
            ! -iname "*test*.jar" \
            ! -iname "*tests*.jar" \
            -exec cp {} dist/ \;

      - name: Upload non-test JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sevenzipjbinding-jars-${{ matrix.artifact-suffix }}
          path: dist/*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ "build_test" ]
    runs-on: "ubuntu-latest"

    steps:
      - name: Download built JARs
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Publish non-test JARs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.jar