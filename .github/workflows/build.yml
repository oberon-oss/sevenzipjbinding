#file: noinspection CIAidGitLabYamlIncludeUnavailable
name: Build, Test, and Deploy JARs

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "Release-*"

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
    fail-fast: false
    matrix:
      include:
        - os: "ubuntu-latest"
          artifact-suffix: "Linux-x86_64"
          platform: "linux"

        - os: "macos-13"
          artifact-suffix: "macOS-x86_64"
          platform: "macos"
          java-arch: "x86_64"
          osx-arch: "x86_64"

        - os: "macos-14"
          artifact-suffix: "macOS-arm64"
          platform: "macos"
          java-arch: "arm64"
          osx-arch: "arm64"

        - os: "windows-latest"
          artifact-suffix: "Windows-x86_64"
          platform: "windows"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make gcc g++

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            ${{ matrix.cmake-extra-args }}

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure

      - name: Collect non-test JARs
        shell: bash
        run: |
          mkdir -p dist
          find build -type f -name "*.jar" \
            ! -iname "*test*.jar" \
            ! -iname "*tests*.jar" \
            -exec cp {} dist/ \;

      - name: Upload non-test JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sevenzipjbinding-jars-${{ runner.os }}
          path: dist/*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-test
    runs-on: ubuntu-latest

    steps:
      - name: Download built JARs
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Publish non-test JARs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.jar